<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sillones a medida | Mueblería Betsi</title>

  <meta name="description" content="Catálogo de sillones a medida en Santiago. Cotiza directamente por WhatsApp.">

  <link rel="stylesheet" href="../css/main.css">
</head>

<body>

<header class="header">
  <div class="container">
    <p class="logo">Mueblería Betsi</p>

    <nav class="nav">
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../index.html#catalogo">Catálogo</a></li>
        <li><a href="../index.html#contacto">Contacto</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

<section class="catalogo-productos">
  <header class="section-header container">
    <h1>Sillones a medida</h1>
    <p>Selecciona un modelo y cotiza directamente por WhatsApp.</p>
  </header>

  <div class="productos-container container">

    <!-- PRODUCTO 1 -->
    <article id="sillon-001" class="producto">
      <img src="../img/sillon1.jpeg" alt="Sillón moderno a medida" loading="lazy">

      <div class="producto-info">
        <h3>Sillón Moderno</h3>
        <p class="codigo">Código: SILLON-001</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Sillón Moderno"
          data-id="SILLON-001">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

    <!-- PRODUCTO 2 -->
    <article id="sillon-002" class="producto">
      <img src="../img/sillon2.jpeg" alt="Sillón clásico tapizado" loading="lazy">

      <div class="producto-info">
        <h3>Sillón Clásico</h3>
        <p class="codigo">Código: SILLON-002</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Sillón Clásico"
          data-id="SILLON-002">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

    <!-- PRODUCTO 3 -->
    <article id="sillon-003" class="producto">
      <img src="../img/sillon3.jpeg" alt="Sillón seccional a medida" loading="lazy">

      <div class="producto-info">
        <h3>Sillón grande</h3>
        <p class="codigo">Código: SILLON-003</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Sillón Seccional"
          data-id="SILLON-003">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

  </div>
</section>

</main>

<footer class="footer">
  <div class="footer-container container">
    <p>&copy; 2026 Mueblería Betsi</p>
  </div>
</footer>

<script src="../js/catalogo.js"></script>

</body>
</html>
