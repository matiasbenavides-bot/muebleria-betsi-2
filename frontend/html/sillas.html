<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sillas a medida | Mueblería Betsi</title>

  <link rel="stylesheet" href="../css/main.css">
</head>

<body>

<header class="header">
  <div class="container">
    <p class="logo">Mueblería Betsi</p>

    <nav class="nav">
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../index.html#catalogo">Catálogo</a></li>
        <li><a href="../index.html#contacto">Contacto</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

<section class="catalogo-productos">
  <header class="section-header container">
    <h1>Sillas a medida</h1>
    <p>Selecciona un modelo y cotiza directamente por WhatsApp.</p>
  </header>

  <div class="productos-container container">

    <!-- PRODUCTO 1 -->
    <article id="silla-001" class="producto">
      <img src="../img/silla1.jpeg" alt="Silla tapizada moderna" loading="lazy">

      <div class="producto-info">
        <h3>Silla Tapizada</h3>
        <p class="codigo">Código: SILLA-001</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Silla Tapizada"
          data-id="SILLA-001">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

    <!-- PRODUCTO 2 -->
    <article id="silla-002" class="producto">
      <img src="../img/silla2.jpeg" alt="Silla de madera a medida" loading="lazy">

      <div class="producto-info">
        <h3>Silla de Madera</h3>
        <p class="codigo">Código: SILLA-002</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Silla de Madera"
          data-id="SILLA-002">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

    <!-- PRODUCTO 3 -->
    <article id="silla-003" class="producto">
      <img src="../img/silla3.jpeg" alt="Silla clásica restaurada" loading="lazy">

      <div class="producto-info">
        <h3>Silla Clásica</h3>
        <p class="codigo">Código: SILLA-003</p>

        <button 
          class="btn cotizar-btn"
          data-nombre="Silla Clásica"
          data-id="SILLA-003">
          Cotizar por WhatsApp
        </button>
      </div>
    </article>

  </div>
</section>

</main>

<footer class="footer">
  <div class="footer-container container">
    <p>&copy; 2026 Mueblería Betsi</p>
  </div>
</footer>

<script src="../js/catalogo.js"></script>

</body>
</html>
